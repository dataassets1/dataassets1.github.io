<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0a1a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- Data analytics: 3 ascending bar chart bars (left side, bottom) -->
  <rect x="80" y="320" width="52" height="100" rx="6" fill="url(#accent)" opacity="0.7"/>
  <rect x="148" y="260" width="52" height="160" rx="6" fill="url(#accent)" opacity="0.85"/>
  <rect x="216" y="195" width="52" height="225" rx="6" fill="url(#accent)" opacity="1"/>

  <!-- Data trend line connecting bar tops, sweeping up into runner path -->
  <path d="M106,315 L174,255 L242,190 Q280,155 310,170"
        stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Trend line arrow dot at end -->
  <circle cx="310" cy="170" r="8" fill="#ffffff" opacity="0.9"/>

  <!-- Runner silhouette (dynamic stride, top-right area) -->
  <!-- Head -->
  <circle cx="355" cy="130" r="28" fill="#ffffff"/>

  <!-- Body torso -->
  <line x1="355" y1="158" x2="345" y2="230" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>

  <!-- Leading arm (forward, reaching) -->
  <path d="M350,185 L305,160" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <!-- Trailing arm (back) -->
  <path d="M350,185 L400,210" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <!-- Leading leg (forward stride) -->
  <path d="M345,230 L295,290 L270,340" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trailing leg (back kick) -->
  <path d="M345,230 L400,280 L430,260" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small data nodes/dots along the trend line for analytics feel -->
  <circle cx="106" cy="315" r="7" fill="#ffffff"/>
  <circle cx="174" cy="255" r="7" fill="#ffffff"/>
  <circle cx="242" cy="190" r="7" fill="#ffffff"/>
</svg>
